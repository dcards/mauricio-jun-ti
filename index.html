        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        :root {
            --profile-border-1: #6FAFB0;
            --profile-border-2: #F5F5F5;
            --link-color: #4C8F8F;
	        --link-bgcolor: rgba(0, 0, 0, .6);
	        --icon-color: #5FB3B3;
            --share-icons-bgcolor: rgba(0, 0, 0, .8);
            --title-color: #ffffff;
            --newtitle-color: #6FAFB0;
            --primary-color: #2c3e50;
            --secondary-color: #6FAFB0;
            --text-color: #ffffff;
            --menu-link-active-color: #1F4E50;
			--degrade-color: rgba(11, 12, 13, 1);
			--font-base: 'Poppins', Arial, Helvetica, sans-serif;
			--top-line-border: rgba(255, 255, 255, 0.7);
			--contacts-icons-color: #D6BA84;
			--contacts-border-color: #C8A96A;
			--contacts-text-color: #F2F2F2;
			--social-icons-color: #EDEDED;
			--social-border-color: #BFC9C9;
			--social-text-color: #EDEDED;
            --fullscreentextcolor: #F2F2F2;
            --fullscreentextbordertopleft: #6e6e6e;
            --fullscreentextborderbottomright: #b6b6b6;
			--addtobtntextcolor: #F5F5F5;
            --addtobtnbordertopleft: #4C8F8F;
            --addtobtnborderbottomright: #5FB3B3;
            --mainfootertext: #b6b6b6;
			--mainfootertopborder: #262626;
            --mainfooterlink: #bfbfbf;
			--content-circular-image-border: #D6BA84;
        }
        
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            background-color: #000;
        }
        body { 
			font-size: clamp(0.75rem, 2vw, 1rem);
			font-family: var(--font-base);
			text-rendering: optimizeSpeed;
			-webkit-text-size-adjust: 100%;
    		-webkit-tap-highlight-color: transparent;
		}

        h1, h2, h3, h4, h5, h6 { font-weight: 600; line-height: 1.2; margin-bottom: 0.5em; color: var(--title-color); text-shadow: 2px 3px 5px rgba(0, 0, 0, 0.7); }
        h1 { font-size: clamp(1.5rem, 5vw, 2.5rem); }
        h2 { font-size: clamp(1.3rem, 4vw, 2rem); }
        h3 { font-size: clamp(1.1rem, 3vw, 1.5rem); }

        /* --- CENA 3D --- */
        .scene {
            width: 100%; 
            height: 100vh; 
            perspective: 2000px;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .card-container {
            width: 100%; 
            height: 100%; 
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-container.is-flipped { transform: rotateY(180deg); }

        .face {
            position: absolute; 
            width: 100%; 
            height: 100%;
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
            transform-style: preserve-3d;
            display: flex;
            justify-content: center;
        }

        .face-back { transform: rotateY(180deg); }

        .content-limit {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            position: relative;
            display: grid;
            grid-template-columns: 0.75fr 0.25fr;
            transform-style: preserve-3d;
        }

        header {
            position: absolute;
			top: 4em;
    		left: 2.5em;
            z-index: 500;
            transform: translateZ(120px);
            pointer-events: none;
			width: 30dvw;
        }
        .logo-link { pointer-events: auto; display: flex; align-items: center; cursor: pointer; }
        header img { max-height: 55px; width: auto; max-width: 100%; filter: drop-shadow(5px 5px 5px rgba(0, 0, 0, 0.55)); }

        .content-area { 
            grid-column: 1; 
            width: calc(75dvw + .4em);
            height: 100%; 
            position: relative; 
            transform-style: preserve-3d;
        }
        
        .section-content {
            position: absolute; 
            width: calc(100% - 1.7em);
            height: 100%;
            left: 1.2em;
            padding: 0;
            color: #fff; 
            overflow-y: auto;
            scrollbar-width: none;
            transform: translateZ(60px);
        }
        .face-front .section-content {
            overflow-y: auto;
			/*background-color: pink;*/
        }
        .face-back .section-content {
            overflow-y: auto;
			/*background-color: cyan;*/
        }

        .section-content::-webkit-scrollbar { display: none; }

        .text-wrapper {
			margin-top: 60dvh;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            padding: 1em;
            border-radius: 15px; 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 60px;
            text-align: left;
        }

        .text-wrapper h2 { margin-bottom: 15px; color: var(--newtitle-color); text-transform: uppercase; }
        .text-wrapper p { line-height: 1.6; margin-bottom: 1em; text-shadow: 2px 3px 5px rgba(0, 0, 0, 0.7); }

        .sidebar {
            max-width: calc((100dvw * 25 / 100) - 1.1em);
            width: calc((100dvw * 25 / 100) - 1.1em);
            grid-column: 2; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            transform: translateZ(90px); 
            padding: .6em .4em;
			background-image: linear-gradient(to right, rgba(255, 0, 0, 0), var(--degrade-color));
        }

        .profile-pic { 
            width: 100%; 
            max-width: 130px; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            border-radius: 50%; 
            margin-bottom: 35px; 
            cursor: pointer;
            pointer-events: auto;
        }

        .nav-icons { list-style: none; display: flex; flex-direction: column; gap: .7em; align-items: center; }
        .nav-icons li i { 
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-icons li i:hover { color: var(--menu-link-active-color); transform: scale(1.1); }

        /* --- CLASSE ATIVA SOLICITADA --- */
        /* Altera apenas a cor do ícone sem mexer na borda */
        .nav-icons a.nav-active i {
            color: var(--menu-link-active-color) !important;
        }

        .bg-layer {
            position: absolute; top: 0; width: 100%; max-width: 1200px; height: 100%;
            background-position: top center; background-size: cover;
            transform: translateZ(0);
            transition: opacity 1.2s ease-in-out; 
            z-index: -1;
        }

        .card-container:not(.is-flipped) #bg-front { opacity: 1; }
        .card-container:not(.is-flipped) #bg-back { opacity: 0; }
        .card-container.is-flipped #bg-back { opacity: 1; }
        .card-container.is-flipped #bg-front { opacity: 0; }

        header, .sidebar, .text-wrapper { transition: opacity 0.1s linear; }

        .card-container:not(.is-flipped) .face-front header,
        .card-container:not(.is-flipped) .face-front .sidebar,
        .card-container:not(.is-flipped) .face-front .text-wrapper {
            opacity: 1; transition-delay: 0.6s;
        }
        .card-container.is-flipped .face-front header,
        .card-container.is-flipped .face-front .sidebar,
        .card-container.is-flipped .face-front .text-wrapper {
            opacity: 0; transition-delay: 0.6s;
        }

        .card-container.is-flipped .face-back header,
        .card-container.is-flipped .face-back .sidebar,
        .card-container.is-flipped .face-back .text-wrapper {
            opacity: 1; transition-delay: 0.6s;
        }
        .card-container:not(.is-flipped) .face-back header,
        .card-container:not(.is-flipped) .face-back .sidebar,
        .card-container:not(.is-flipped) .face-back .text-wrapper {
            opacity: 0; transition-delay: 0.6s;
        }

        #overlay-menu {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 1200px; height: 100vh;
            background: rgba(0, 0, 0, 0.98); z-index: 1000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #overlay-menu.active { display: flex; }
        .close-btn { position: absolute; top: 30px; right: 30px; font-size: 50px; color: #fff; cursor: pointer; }
        .overlay-list { list-style: none; text-align: center; }
        .overlay-list li { color: var(--icon-color); margin: .3em; font-size: 1.3rem; cursor: pointer; text-transform: capitalize; }

        .circular-image {
            width: 95%; max-width: 8rem; aspect-ratio: 1 / 1; border-radius: 50%;
            position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 1em;
        }
        .circular-image img { width: 95%; aspect-ratio: 1 / 1; border-radius: 50%; object-fit: cover; margin: 0 auto; }
        .circular-image::before, .circular-image::after { content: ''; position: absolute; width: 95%; height: 95%; border-radius: 50%; }
        .circular-image::before { border: 2px solid transparent; border-bottom: 3px solid var(--profile-border-1); border-right: 2px solid var(--profile-border-1); border-left: 1px solid var(--profile-border-1); border-top: 2px solid var(--profile-border-1); animation: rotate 5s linear infinite; filter: drop-shadow(0 0 2px var(--profile-border-1)); z-index: -1; }
        .circular-image::after { border: 2px solid transparent; border-top: 3px solid var(--profile-border-2); border-right: 2px solid var(--profile-border-2); border-left: 1px solid var(--profile-border-2); border-bottom: 2px solid var(--profile-border-2); animation: rotatereverse 5s linear infinite; filter: drop-shadow(0 0 4px var(--profile-border-2)); z-index: -1; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotatereverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .nav-icons a {
            display: inline-flex; border: 2px solid var(--link-color); border-radius: 100%;
            background-color: var(--link-bgcolor); width: clamp(2.851rem, 10vw, 4rem);
            aspect-ratio: 1 / 1; justify-content: center; align-items: center; text-decoration: none;
        }
        .nav-icons a i { color: var(--icon-color); }

        /* Share Buttons Styles */
        .share-menu { list-style: none; display: flex; flex-direction: column; gap: .5rem; font-size: clamp(1.5rem, 5vw, 2.5rem); }
        .share-buttons { display: none; margin-right: 10px; }
        .share-buttons.show {
            display: flex !important; position: fixed; right: calc(25dvw - .7em); z-index: 1001;
            align-items: flex-end; background-color: var(--share-icons-bgcolor);
            padding: .7rem .5rem; border-radius: 50% / 9.5%; flex-direction: column;
        }
        .share-item a {
            color: var(--icon-color); border: 2px solid var(--link-color); border-radius: 100%;
            background-color: var(--link-bgcolor); width: clamp(2.851rem, 10vw, 4rem);
            aspect-ratio: 1 / 1; display: flex; justify-content: center; align-items: center; text-decoration: none;
        }
        .copy-tooltip {
            position: absolute; background-color: var(--share-icons-bgcolor); color: white;
            padding: 5px 10px; border-radius: 4px; font-size: .7em; /*bottom: 100%;*/bottom: -2.7em; left: 50%;
            transform: translateX(-50%); white-space: nowrap; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; margin-bottom: 5px; z-index: 1001;
        }
		.copy-link { position: relative; }
		.fade-wrapper {
			/* Envolve o conteúdo rolável e aplica a máscara */
			-webkit-mask-image: linear-gradient(to bottom, transparent 85px, black 120px, black 100%);
			mask-image: linear-gradient(to bottom, transparent 85px, black 120px, black 100%);
			-webkit-mask-size: 100% 100%;
			mask-size: 100% 100%;
			-webkit-mask-repeat: no-repeat;
			mask-repeat: no-repeat;
		}

		/* --- ESTILIZAÇÃO DO CONJUNTO SHARE + QRCODE --- */
		.share-buttons.show {
			display: flex !important; 
			position: fixed; 
			right: calc(25dvw - .7em); 
			z-index: 1001;
			align-items: center; /* Centralização vertical dos itens (QR e Menu) */
			justify-content: center;
			background-color: var(--share-icons-bgcolor);
			padding: 1.5rem;
			/* Novo border-radius aprimorado para o conjunto */
			border-radius: 25px; 
			border: 1px solid rgba(255, 255, 255, 0.1);
			backdrop-filter: blur(10px);
			flex-direction: row; /* QRCode à esquerda, Menu à direita */
			gap: 1.5rem;
			/* Limite solicitado de 65% da largura da área visível */
			max-width: 65vw;
			box-shadow: 0 10px 30px rgba(0,0,0,0.5);
		}

		/* Container do QRCode e Legenda */
		.qrcode-wrapper {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			flex-shrink: 0;
		}
		.qrcode-img {
			width: clamp(27dvw, 15vw, 150px);
			height: auto;
			border: 5px solid #fff;
			border-radius: 8px;
			margin-bottom: 8px;
		}
		.qrcode-legend {
			color: var(--icon-color);
			font-size: 0.75rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 1px;
			white-space: nowrap;
		}

		/* Ajuste fino na lista de ícones para não perder o alinhamento */
		.share-menu { 
			list-style: none; 
			display: flex; 
			flex-direction: column; 
			gap: 0.5rem; 
		}

		/* --- ESTILIZAÇÃO DO COMPONENTE DE CONTATOS --- */
		.contact-container {
			display: grid;
			grid-template-columns: repeat(3, 1fr); /* 3 colunas por linha */
			gap: 1.5rem 0.8rem;
			width: 100%;
			justify-content: center;
		}
		.contact-item {
			text-decoration: none;
			display: flex;
			flex-direction: column;
			align-items: center;
			transition: transform 0.3s ease;
		}
		.contact-item:hover {
			transform: translateY(-5px);
		}
		.contact-btn {
			width: clamp(2.851rem, 10vw, 4rem);
			aspect-ratio: 1 / 1;
			border-radius: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			background-color: var(--link-bgcolor);
			/* Sugestão de cor: Bordas em dourado/laranja para destaque */
			border: 2px solid var(--contacts-border-color);
			margin-bottom: 8px;
			box-shadow: 0 4px 15px rgba(0,0,0,0.3);
		}
		.contact-btn i {
			/* Sugestão de cor: Ícones acompanhando a borda */
			color: var(--contacts-icons-color);
			font-size: clamp(1.5rem, 5vw, 2.5rem);
		}
		.contact-label {
			color: var(--contacts-text-color);
			font-size: clamp(0.65rem, 2vw, 0.75rem);
			text-transform: uppercase;
			font-weight: 500;
			letter-spacing: 0.5px;
			text-align: center;
		}
		.contact-grid-wrapper {
			padding-bottom: 1em;
		}

		/* --- COMPONENTE DE REDES SOCIAIS --- */
		.social-grid-wrapper {
			padding: 1em 0;
			border-top: 1px solid var(--top-line-border);
			width: 100%;
			justify-content: center; /* Centraliza horizontalmente */
		}
		.social-container {
			display: flex;
			flex-wrap: wrap; /* Quebra linha se necessário */
			justify-content: center;
			gap: 1rem; /* Espaçamento uniforme */
			max-width: 100%;
			margin-top: 1em;
		}
		.social-btn {
			width: clamp(2.851rem, 10vw, 4rem); /* Mesma dimensão do contact-grid-wrapper */
			aspect-ratio: 1 / 1;
			border-radius: 50%;
			display: flex;
			justify-content: center;
			align-items: center;
			background-color: var(--link-bgcolor);
			/* Sugestão: Borda dourada para manter o padrão Premium */
			border: 2px solid var(--social-border-color);
			text-decoration: none;
			transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
		}
		.social-btn i {
			/* Sugestão: Ícones em dourado */
			color: var(--social-icons-color);
			font-size: clamp(1.5rem, 5vw, 2.5rem);
		}
		/* Efeito de Hover para interatividade */
		.social-btn:hover {
			transform: scale(1.1) translateY(-3px);
			background-color: var(--secondary-color);
		}
		.social-btn:hover i {
			color: #000; /* Inverte a cor no hover para destaque */
		}

        /* Modal Add To */
		/* The Modal (background) */
		.modal {
			display: none; /* Hidden by default */
			position: fixed; /* Stay in place */
			z-index: 19999;
			left: 0;
			top: initial !important;
			bottom: 0 !important;
			width: 100%; /* Full width */
			height: auto !important;
			overflow: auto; /* Enable scroll if needed */
			background-color: rgb(0,0,0); /* Fallback color */
			background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
			-webkit-animation-name: fadeIn; /* Fade in the background */
			-webkit-animation-duration: 0.4s;
			animation-name: fadeIn;
			animation-duration: 0.4s;
		}
		/* Modal Content */
		.modal-content {
			position: fixed;
			bottom: 0;
			background-color: #fefefe;
			width: 100%;

	<style>
		/* 2. CONFIGURAÇÃO DE CAMADA DE FUNDO */
		#bg-front, #bg-back {
			/* O segredo: background-size cover garante que a imagem preencha a div, 
			enquanto o transform scale cria a 'sobra' para o movimento. */
			background-size: cover !important; 
			background-position: center top !important;
			background-repeat: no-repeat !important;
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			/* Aceleração de Hardware */
			will-change: transform;
			transform: translateZ(0);
			/* Loop cinematográfico retornando ao estado original */
			animation: cinematicImpact 25s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite !important;
		}
		/* 3. O MOVIMENTO CINEMATOGRÁFICO (RETORNO AO ORIGINAL) */
		@keyframes cinematicImpact {
			/* ESTADO 0%: Original, cobrindo tudo perfeitamente */
			0% {
				transform: scale(1.1) translateX(0) translateY(0) rotate(0deg);
			}	
			/* MOVIMENTO 1: Zoom in com leve deslocamento lateral */
			33% {
				transform: scale(1.25) translateX(-2%) translateY(1%) rotate(0.5deg);
			}
			/* MOVIMENTO 2: Pan dramático para o outro lado */
			66% {
				transform: scale(1.15) translateX(2%) translateY(2%) rotate(-0.5deg);
			}
			/* RETORNO AO ORIGINAL (100%): Fecha o loop sem saltos */
			100% {
				transform: scale(1.1) translateX(0) translateY(0) rotate(0deg);
			}
		}
		/* 4. OVERLAY PARA LEGIBILIDADE */
		.bg-layer::after {
			content: '';
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background: linear-gradient(to bottom, 
				rgba(0,0,0,0.2) 0%, 
				transparent 50%, 
				rgba(0,0,0,0.7) 100%);
			pointer-events: none;
			z-index: 1;
		}
	</style>

                // Remove classe ativa de todos os itens em ambas as faces
